{% extends "base.html" %}
{% block title %}Modifica Profilo — StefiNick Reviews{% endblock %}
{% block content %}
<div class="max-w-md">
  <h1 class="text-2xl font-bold mb-6">Modifica Profilo</h1>
  <form method="post" enctype="multipart/form-data" class="space-y-4">
    {% csrf_token %}
    {% for field in form %}
      <div>
        <label class="block text-sm text-gray-400 mb-1">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
          <p class="text-red-400 text-xs mt-1">{{ field.errors|join:", " }}</p>
        {% endif %}
      </div>
    {% endfor %}
    <button type="submit"
      class="bg-brand hover:bg-green-700 text-white font-semibold px-4 py-2 rounded transition">
      Salva
    </button>
    <a href="/accounts/profile/{{ request.user.username }}/"
      class="ml-3 text-gray-400 hover:text-white text-sm">Annulla</a>
  </form>
</div>
{% endblock %}
