<div id="comments-{{ review.id }}" class="mt-4 border-t border-gray-800 pt-4 space-y-3">
  {% for comment in comments %}
    <div class="flex gap-3 text-sm">
      <a href="/accounts/profile/{{ comment.author.username }}/" class="flex-shrink-0">
        {% if comment.author.avatar %}
          <img src="{{ comment.author.avatar.url }}" alt="{{ comment.author.username }}"
            class="w-6 h-6 rounded-full object-cover">
        {% else %}
          <div class="w-6 h-6 rounded-full bg-gray-700 flex items-center justify-center text-xs font-semibold">
            {{ comment.author.username|first|upper }}
          </div>
        {% endif %}
      </a>
      <div>
        <span class="font-medium text-gray-300">{{ comment.author.username }}</span>
        <span class="text-gray-400 ml-1">{{ comment.text }}</span>
        <span class="text-gray-600 text-xs ml-2">{{ comment.created_at|timesince }} fa</span>
      </div>
    </div>
  {% empty %}
    <p class="text-gray-600 text-xs">Nessun commento ancora.</p>
  {% endfor %}

  <!-- Add comment form (HTMX) -->
  <form
    hx-post="/reviews/{{ review.id }}/comments/add/"
    hx-target="#comments-{{ review.id }}"
    hx-swap="outerHTML"
    hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
    class="flex gap-2 mt-3">
    {{ comment_form.text }}
    <button type="submit"
      class="flex-shrink-0 bg-brand hover:bg-green-700 text-white text-sm px-3 py-1.5 rounded transition">
      Invia
    </button>
  </form>
</div>
