<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-950">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}StefiNick Reviews{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#00b020', dark: '#009018' }
          }
        }
      }
    }
  </script>
</head>
<body class="h-full text-gray-100 font-sans antialiased">

  <!-- Nav -->
  <nav class="bg-gray-900 border-b border-gray-800 sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-4 flex items-center justify-between h-14">
      <a href="/" class="text-brand font-bold text-lg tracking-tight">StefiNick Reviews</a>
      <div class="flex items-center gap-4 text-sm">
        <a href="/films/" class="text-gray-300 hover:text-white">Film</a>
        <a href="/books/" class="text-gray-300 hover:text-white">Libri</a>
        {% if user.is_authenticated %}
          <a href="/reviews/new/" class="bg-brand hover:bg-brand-dark text-white px-3 py-1.5 rounded font-medium transition">+ Recensione</a>
          <a href="/accounts/profile/{{ user.username }}/" class="text-gray-300 hover:text-white">{{ user.username }}</a>
          <form method="post" action="/accounts/logout/">
            {% csrf_token %}
            <button type="submit" class="text-gray-400 hover:text-white">Esci</button>
          </form>
        {% else %}
          <a href="/accounts/login/" class="text-gray-300 hover:text-white">Accedi</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <!-- Flash messages -->
  {% if messages %}
    <div class="max-w-5xl mx-auto px-4 mt-4 space-y-2">
      {% for message in messages %}
        <div class="px-4 py-3 rounded text-sm
          {% if message.tags == 'error' %}bg-red-900 text-red-200
          {% elif message.tags == 'success' %}bg-green-900 text-green-200
          {% else %}bg-gray-800 text-gray-200{% endif %}">
          {{ message }}
        </div>
      {% endfor %}
    </div>
  {% endif %}

  <!-- Page content -->
  <main class="max-w-5xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
